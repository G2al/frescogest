<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>Nuova password · Il Paradiso della Frutta</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png">
    <link rel="stylesheet" href="/assets/css/app.css?v=20260720.9">
</head>
<body class="auth-page" data-guest-only="true">
    <main class="auth-main">
        <form class="form-shell auth-form" data-endpoint="/auth/reset-password">
            <a class="auth-brand" href="/" aria-label="Torna alla home"><img src="/assets/images/ilparadisodellafrutta-logo-primary.png" alt="Il Paradiso della Frutta"></a>
            <div class="auth-form-head"><span class="auth-form-icon"><i data-lucide="key-round"></i></span><div><span class="eyebrow">Recupero account</span><h2>Scegli una nuova password</h2></div></div>
            <input id="token" name="token" type="hidden">
            <div class="stack">
                <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" required></div>
                <div class="field"><div class="password-label"><label for="password">Nuova password</label><button type="button" data-generate-password>Genera sicura</button></div><div class="password-control"><input id="password" name="password" type="password" minlength="4" required><button class="password-toggle" type="button" data-target="password" aria-label="Mostra password"><i data-lucide="eye"></i></button></div><div class="password-meter" data-level="weak"><span></span></div><small class="password-hint">Minimo 4 caratteri</small></div>
                <div class="field"><label for="password_confirmation">Conferma password</label><div class="password-control"><input id="password_confirmation" name="password_confirmation" type="password" minlength="4" required><button class="password-toggle" type="button" data-target="password_confirmation" aria-label="Mostra password"><i data-lucide="eye"></i></button></div></div>
            </div>
            <div class="form-message"></div>
            <button class="btn btn-primary" type="submit"><i data-lucide="check"></i>Aggiorna password</button>
        </form>
    </main>
    <script>const p=new URLSearchParams(location.search);document.querySelector('#token').value=p.get('token')||'';document.querySelector('#email').value=p.get('email')||'';</script>
    <script type="module" src="/assets/js/auth.js?v=20260722.2"></script>
</body>
</html>
