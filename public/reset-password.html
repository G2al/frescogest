<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Nuova password · FrescoGest</title><link rel="stylesheet" href="/assets/css/app.css?v=20260717.5"></head><body><header id="site-header"></header><main><form class="form-shell" data-endpoint="/auth/reset-password"><span class="eyebrow">Recupero account</span><h2>Scegli una nuova password</h2><input id="token" name="token" type="hidden"><div class="stack"><div class="field"><label for="email">Email</label><input id="email" name="email" type="email" required></div><div class="field"><label for="password">Nuova password</label><input id="password" name="password" type="password" minlength="8" required></div><div class="field"><label for="password_confirmation">Conferma password</label><input id="password_confirmation" name="password_confirmation" type="password" minlength="8" required></div></div><div class="form-message"></div><button class="btn btn-primary" type="submit">Aggiorna password</button></form></main><footer id="site-footer" class="footer"></footer><script>const p=new URLSearchParams(location.search);document.querySelector('#token').value=p.get('token')||'';document.querySelector('#email').value=p.get('email')||'';</script><script type="module" src="/assets/js/auth.js?v=20260717.5"></script></body></html>
