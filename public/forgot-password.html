<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>Recupera password · Il Paradiso della Frutta</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png">
    <link rel="stylesheet" href="/assets/css/app.css?v=20260720.9">
</head>
<body class="auth-page" data-guest-only="true">
    <main class="auth-main">
        <form class="form-shell auth-form" data-endpoint="/auth/forgot-password">
            <a class="auth-brand" href="/" aria-label="Torna alla home"><img src="/assets/images/ilparadisodellafrutta-logo-primary.png" alt="Il Paradiso della Frutta"></a>
            <div class="auth-form-head"><span class="auth-form-icon"><i data-lucide="mail-question"></i></span><div><span class="eyebrow">Recupero account</span><h2>Password dimenticata?</h2></div></div>
            <p class="lead">Inserisci l’email utilizzata durante la registrazione. Ti invieremo le istruzioni per scegliere una nuova password.</p>
            <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" autocomplete="email" required></div>
            <div class="form-message"></div>
            <button class="btn btn-primary" type="submit"><i data-lucide="send"></i>Invia istruzioni</button>
            <p class="auth-alternative">Ricordi la password? <a href="/login.html">Torna all’accesso</a></p>
        </form>
    </main>
    <script type="module" src="/assets/js/auth.js?v=20260721.4"></script>
</body>
</html>
