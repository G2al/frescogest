<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>Carrello · Il Paradiso della Frutta</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png">
    <link rel="stylesheet" href="/assets/css/app.css?v=20260722.2">
</head>
<body>
    <header id="site-header"></header>
    <main class="container">
        <header class="page-head"><span class="eyebrow">La tua selezione</span><h1>Carrello</h1><p class="lead">Controlla quantità e prezzi prima di inviare la richiesta.</p></header>
        <section id="cart" class="stack"></section>
        <form id="order-form" class="form-shell hidden">
            <div class="cart-summary"><span>Totale IVA inclusa</span><strong id="cart-total">€ 0,00</strong></div>
            <div class="field"><label for="customer_notes">Note per Antonio</label><textarea id="customer_notes" name="customer_notes" rows="4" placeholder="Preferenze, indicazioni sulla consegna o altre richieste"></textarea></div>
            <p>L’ordine verrà salvato prima di aprire WhatsApp.</p>
            <button class="btn btn-primary" type="submit">Conferma e continua su WhatsApp</button>
        </form>
    </main>
    <footer id="site-footer" class="footer"></footer>
    <script type="module" src="/assets/js/cart.js?v=20260722.3"></script>
</body>
</html>
