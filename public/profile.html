<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>Il mio account · Cerino Store</title>
    <link rel="icon" type="image/png" href="/assets/images/cerino-favicon.png?v=20260723.2">
    <link rel="stylesheet" href="/assets/css/app.css?v=20260723.11">
</head>
<body>
    <header id="site-header"></header>
    <main>
        <form id="profile-form" class="form-shell">
            <span class="eyebrow">Il tuo account</span><h2>I tuoi dati</h2>
            <div class="form-grid">
                <div class="field"><label for="first_name">Nome</label><input id="first_name" name="first_name"></div>
                <div class="field"><label for="last_name">Cognome</label><input id="last_name" name="last_name"></div>
                <div class="field"><label for="email">Email</label><input id="email" name="email" type="email"></div>
                <div class="field"><label for="phone">Telefono</label><input id="phone" name="phone"></div>
                <div class="field full"><label for="delivery_address">Indirizzo di consegna</label><input id="delivery_address" name="delivery_address"></div>
                <div class="field"><label for="city">Città</label><input id="city" name="city"></div>
                <div class="field"><label for="postal_code">CAP</label><input id="postal_code" name="postal_code"></div>
                <div class="field"><label for="province">Provincia</label><input id="province" name="province"></div>
                <div class="field full"><label for="notes">Note</label><textarea id="notes" name="notes" rows="4"></textarea></div>
            </div>
            <div class="form-message"></div><button class="btn btn-primary" type="submit">Salva modifiche</button>
        </form>
    </main>
    <footer id="site-footer" class="footer"></footer>
    <script type="module" src="/assets/js/profile.js?v=20260723.1"></script>
</body>
</html>
