<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Registrati · FrescoGest</title><link rel="stylesheet" href="/assets/css/app.css"></head><body data-guest-only="true"><header id="site-header"></header><main><form class="form-shell" data-endpoint="/auth/register"><span class="eyebrow">Nuovo cliente</span><h2>Crea il tuo account</h2><div class="form-grid"><div class="field"><label for="first_name">Nome</label><input id="first_name" name="first_name" required></div><div class="field"><label for="last_name">Cognome</label><input id="last_name" name="last_name" required></div><div class="field full"><label for="email">Email</label><input id="email" name="email" type="email" autocomplete="email" required></div><div class="field full"><label for="phone">Telefono</label><input id="phone" name="phone" type="tel" autocomplete="tel" required></div><div class="field"><label for="password">Password</label><input id="password" name="password" type="password" minlength="8" required></div><div class="field"><label for="password_confirmation">Conferma password</label><input id="password_confirmation" name="password_confirmation" type="password" minlength="8" required></div></div><div class="form-message"></div><button class="btn btn-primary" type="submit">Registrati</button></form></main><footer id="site-footer" class="footer"></footer><script type="module" src="/assets/js/auth.js"></script></body></html>
