<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>Registrati · Il Paradiso della Frutta</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png">
    <link rel="stylesheet" href="/assets/css/app.css?v=20260720.9">
</head>
<body class="auth-page" data-guest-only="true">
    <main class="auth-main">
        <form class="form-shell auth-form auth-form-register" data-endpoint="/auth/register">
            <a class="auth-brand" href="/" aria-label="Torna alla home"><img src="/assets/images/ilparadisodellafrutta-logo-primary.png" alt="Il Paradiso della Frutta"></a>
            <div class="auth-form-head">
                <span class="auth-form-icon"><i data-lucide="user-plus"></i></span>
                <div><span class="eyebrow">Nuovo cliente</span><h2>Crea il tuo account</h2></div>
            </div>
            <div class="form-grid">
                <fieldset class="account-type-field full">
                    <legend>Come vuoi acquistare?</legend>
                    <div class="account-type-options">
                        <label class="account-type-option"><input name="type" type="radio" value="private" checked required><span class="account-type-card"><span class="account-type-icon"><i data-lucide="user-round"></i></span><span><strong>Privato</strong><small>Quantità standard e acquisti flessibili</small></span><i class="account-type-check" data-lucide="circle-check"></i></span></label>
                        <label class="account-type-option"><input name="type" type="radio" value="restaurant" required><span class="account-type-card"><span class="account-type-icon"><i data-lucide="chef-hat"></i></span><span><strong>Ristoratore</strong><small>Listino e quantità minime professionali</small></span><i class="account-type-check" data-lucide="circle-check"></i></span></label>
                    </div>
                </fieldset>
                <div class="field full restaurant-registration-field hidden"><label for="company_name">Nome attività</label><input id="company_name" name="company_name" autocomplete="organization"></div>
                <div class="field"><label for="first_name">Nome</label><input id="first_name" name="first_name" autocomplete="given-name" required></div>
                <div class="field"><label for="last_name">Cognome</label><input id="last_name" name="last_name" autocomplete="family-name" required></div>
                <div class="field full"><label for="email">Email</label><input id="email" name="email" type="email" autocomplete="email" inputmode="email" required></div>
                <div class="field full"><label for="phone">Telefono</label><input id="phone" name="phone" type="tel" autocomplete="tel" inputmode="tel" required></div>
                <div class="field"><div class="password-label"><label for="password">Password</label><button type="button" data-generate-password>Genera sicura</button></div><div class="password-control"><input id="password" name="password" type="password" autocomplete="new-password" minlength="4" required><button class="password-toggle" type="button" data-target="password" aria-label="Mostra password"><i data-lucide="eye"></i></button></div><div class="password-meter" data-level="weak"><span></span></div><small class="password-hint">Minimo 4 caratteri</small></div>
                <div class="field"><label for="password_confirmation">Conferma password</label><div class="password-control"><input id="password_confirmation" name="password_confirmation" type="password" autocomplete="new-password" minlength="4" required><button class="password-toggle" type="button" data-target="password_confirmation" aria-label="Mostra password"><i data-lucide="eye"></i></button></div></div>
            </div>
            <div class="form-message"></div>
            <div class="auth-form-actions"><button class="btn btn-primary" type="submit"><i data-lucide="user-plus"></i>Registrati</button></div>
            <p class="auth-alternative">Hai già un account? <a href="/login.html">Accedi</a></p>
        </form>
    </main>
    <script type="module" src="/assets/js/auth.js?v=20260722.3"></script>
</body>
</html>
